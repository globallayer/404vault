# Use Python provider explicitly
[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
dependsOn = ["setup"]
cmds = [
    "python -m pip install --upgrade pip",
    "python -m pip install -r requirements.txt",
    "python -m pip install -e ."
]

[start]
cmd = "python -m uvicorn clawdex.api.server:app --host 0.0.0.0 --port ${PORT:-8000}"
